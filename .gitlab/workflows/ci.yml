image: $GITLAB_CI_IMAGE

default:
  interruptible: true

workflow:
  auto_cancel:
    on_job_failure: all

include:
  - component: $CI_SERVER_FQDN/${CI_COMPONENT}

    inputs:
      enable_lint: true
      enable_test: true
      enable_changeset: true
      type_check_cache_paths:
        - node_modules
      test_cache_paths:
        - node_modules
      lint_script:
        - npm run lint
